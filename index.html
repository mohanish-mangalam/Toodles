<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toodles ❤️</title>

<style>

body{
margin:0;
font-family:'Comic Sans MS',cursive;
background:linear-gradient(to bottom,#ffe6f2,#fff5fa);
text-align:center;
overflow:hidden;
}

/* Floating hearts background */

.bgHeart{
position:fixed;
color:#ffb3d9;
animation:float 8s linear infinite;
z-index:-1;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:0}
20%{opacity:1}
100%{transform:translateY(-100vh);opacity:0}
}

/* Start screen */

#startScreen{
position:fixed;
width:100%;
height:100vh;
background:#ffb6d9;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:1000;
}

#startBtn{
padding:15px 30px;
border:none;
border-radius:30px;
font-size:20px;
background:#ff1493;
color:white;
}

/* Gallery */

.gallery{
display:none;
overflow:hidden;
width:100%;
height:100vh;
}

.galleryTrack{
display:flex;
transition:transform 0.4s ease;
height:100%;
align-items:center;
}

.photo-card{
min-width:100%;
}

.photo-card img{
width:85%;
max-width:340px;
border-radius:20px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.caption{
color:#cc0066;
margin-top:10px;
font-size:22px;
}

/* Owl */

#owl{
position:fixed;
bottom:20px;
right:20px;
font-size:60px;
cursor:pointer;
}

#owlBubble{
position:fixed;
bottom:100px;
right:20px;
background:white;
padding:15px;
border-radius:20px;
display:none;
font-size:18px;
max-width:220px;
}

/* Shinchan */

#shinchan{
position:fixed;
bottom:25px;
left:20px;
width:70px;
display:none;
}

/* Proposal */

.proposal{
display:none;
margin-top:60px;
}

.proposalButtons{
display:flex;
justify-content:center;
gap:15px;
margin-top:20px;
}

button{
padding:15px 20px;
font-size:16px;
border:none;
border-radius:25px;
}

#yesBtn{
background:#ff66b2;
color:white;
}

#noBtn{
background:#777;
color:white;
position:relative;
}

/* Shiva */

#shivaContainer{
display:none;
margin-top:20px;
}

#shivaContainer img{
width:120px;
}

/* Wedding */

#wedding{
display:none;
margin-top:20px;
}

#wedding img{
width:90%;
max-width:350px;
border-radius:20px;
}

/* Heart explosion */

.heart{
position:fixed;
color:#ff1493;
animation:fade 1s linear forwards;
}

@keyframes fade{
to{opacity:0;transform:translateY(-20px);}
}

</style>
</head>

<body>

<div id="startScreen">
<h2>Toodles… ready? ❤️</h2>
<button id="startBtn">Tap to Begin 💖</button>
</div>

<audio id="music" loop>
<source src="romantic.mp3" type="audio/mpeg">
</audio>

<div class="gallery" id="gallery"></div>

<img id="shinchan">

<div class="proposal" id="proposal">

<h2 id="proposalText"></h2>

<div class="proposalButtons">
<button id="yesBtn">Theek hai, kar hi leti hu</button>
<button id="noBtn">Kabhi Nahi</button>
</div>

<div id="shivaContainer">
<img src="shiva.png">
<p>Haan bol do beti, vats tumhein sada prasann rakhega</p>
</div>

<div id="wedding">
<img src="wedding.gif">
</div>

</div>

<div id="owl">🦉</div>
<div id="owlBubble"></div>

<script>

/* Floating hearts */

setInterval(()=>{
let heart=document.createElement("div")
heart.className="bgHeart"
heart.innerHTML="💗"
heart.style.left=Math.random()*window.innerWidth+"px"
heart.style.fontSize=(10+Math.random()*20)+"px"
document.body.appendChild(heart)
setTimeout(()=>heart.remove(),8000)
},400)

/* Gallery setup */

let captions=[
  "Let's try and see where it goes",
"I promise I will learn to tie my shoelaces better so that you never have to wait for me in the middle of the road😌",
"I promise I will polish my flirting skills and add all kinds of flavours to it so that you don't have to be non-chalant",
"I promise to be by your side with strength & honour through the 'Ups & Downs' of the journey we call Life",
"....and through the 'Ebbs & Flows' of it, and make you laugh loudly at the most inappropriate of moments",
"I promise to remember all the important dates and the very important ones; because when you're involved, nothing can be less than important to me",
"I promise that if I ever get drunk, you will be my first and only drunk call",
"I promise I will make honest efforts to resolve any disagreements/arguements/misunderstandings that might come our way, try and be creative about my solutions and most importantly, not wait for long periods to do so",
]

let gallery=document.getElementById("gallery")
gallery.innerHTML='<div class="galleryTrack" id="track"></div>'
let track=document.getElementById("track")

for(let i=1;i<=8;i++){
track.innerHTML+=`
<div class="photo-card">
<img src="photo${i}.png">
<div class="caption">${captions[i-1]}</div>
</div>
`
}

/* Owl speech */

function showOwl(text){
let bubble=document.getElementById("owlBubble")
bubble.innerText=text
bubble.style.display="block"
setTimeout(()=>bubble.style.display="none",7000)
}

/* Shinchan appearance */

function showShinchan(image,text){

let shin=document.getElementById("shinchan")

shin.src=image
shin.style.display="block"

showOwl(text)

setTimeout(()=>shin.style.display="none",6000)

}

/* Start */

document.getElementById("startBtn").onclick=function(){

document.getElementById("music").play()

document.getElementById("startScreen").style.display="none"

gallery.style.display="block"

showOwl("Hoot hoot Toodles… swipe to see the 7 promises❤️ of an underdog!")

}

/* Swipe gallery */

let current=0
let startX=0

gallery.addEventListener("touchstart",(e)=>{
startX=e.touches[0].clientX
})

gallery.addEventListener("touchend",(e)=>{

let endX=e.changedTouches[0].clientX

if(startX-endX>50) next()
if(endX-startX>50) prev()

})

function next(){
if(current<7){
current++
updateGallery()
}
}

function prev(){
if(current>0){
current--
updateGallery()
}
}

function updateGallery(){

track.style.transform="translateX(-"+current*100+"%)"

if(current==2)
showShinchan("shinchan_rose.png","Arre wah romance chal raha hai!")

if(current==6)
showOwl("Almost at the important question...")

if(current==7)
showProposal()

}

/* Proposal */

function showProposal(){

gallery.style.display="none"

showShinchan("shinchan_shocked.png","Mujhe sab pata hai… proposal hone wala hai!")

document.getElementById("proposal").style.display="block"

typeProposal()

}

function typeProposal(){

let text="The man who would get to marry you will definitely be a lucky one. May I be that LUCKY ONE? 💍"

let i=0
let target=document.getElementById("proposalText")

let typing=setInterval(()=>{
target.innerHTML+=text[i]
i++
if(i==text.length) clearInterval(typing)
},80)

}

/* No button escape */

let noBtn=document.getElementById("noBtn")

let attempts=0
let activated=false

noBtn.addEventListener("mouseover",activateEscape)
noBtn.addEventListener("touchstart",activateEscape)

function activateEscape(){

if(!activated){

activated=true
noBtn.style.position="fixed"
escape()

}else{

escape()

}

}

function escape(){

attempts++

showShinchan("shinchan_naughty.png","Aap shaadi se bhaag rahi ho? Hehehe!")

let x=Math.random()*(window.innerWidth-120)
let y=Math.random()*(window.innerHeight-120)

noBtn.style.left=x+"px"
noBtn.style.top=y+"px"

if(attempts==4){

document.getElementById("shivaContainer").style.display="block"
showOwl("Bhagwan bhi keh rahe hain…")

}

if(attempts==6){

showOwl("Nice try… ye button actually kaam hi nahi karta 😌")

}

}

/* Yes button */

document.getElementById("yesBtn").onclick=function(){

showShinchan("shinchan_dance.png","Shaadi! Shaadi! Shaadi!")

document.getElementById("wedding").style.display="block"

confetti()

}

/* Heart explosion */

function confetti(){

for(let i=0;i<200;i++){

let div=document.createElement("div")

div.className="heart"

div.innerHTML="❤️"

div.style.left=Math.random()*window.innerWidth+"px"
div.style.top=Math.random()*window.innerHeight+"px"

document.body.appendChild(div)

setTimeout(()=>div.remove(),1000)

}

}

/* Owl Easter Egg */

let owlClicks=0

document.getElementById("owl").onclick=function(){

owlClicks++

if(owlClicks==3){

showOwl("The AI community humbly requests you to do something about this mad human who treats us as his slave to impress a woman, although...... a damn fine woman indeed!!")

owlClicks=0

}

}

</script>

</body>
</html>
