<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toodles ❤️</title>

<style>

body{
margin:0;
font-family:'Comic Sans MS',cursive;
background:linear-gradient(to bottom,#ffe6f2,#fff5fa);
text-align:center;
overflow:hidden;
}

/* Floating hearts */

.bgHeart{
position:fixed;
color:#ffb3d9;
animation:float 8s linear infinite;
z-index:-1;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:0}
20%{opacity:1}
100%{transform:translateY(-100vh);opacity:0}
}

/* Start screen */

#startScreen{
position:fixed;
width:100%;
height:100vh;
background:#ffb6d9;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:1000;
}

#startBtn{
padding:15px 30px;
border:none;
border-radius:30px;
font-size:20px;
background:#ff1493;
color:white;
}

/* Gallery */

.gallery{
display:none;
overflow:hidden;
width:100%;
height:100vh;
}

.galleryTrack{
display:flex;
transition:transform 0.4s ease;
height:100%;
align-items:center;
}

.photo-card{
min-width:100%;
}

.photo-card img{
width:85%;
max-width:340px;
border-radius:20px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.caption{
color:#cc0066;
margin-top:10px;
font-size:22px;
}

/* Proposal */

.proposal{
display:none;
margin-top:60px;
}

.proposalButtons{
display:none;
justify-content:center;
gap:15px;
margin-top:20px;
}

button{
padding:15px 20px;
font-size:16px;
border:none;
border-radius:25px;
}

#yesBtn{
background:#ff66b2;
color:white;
}

#noBtn{
background:#777;
color:white;
position:relative;
}

/* Wedding */

#wedding{
display:none;
margin-top:20px;
}

#wedding img{
width:90%;
max-width:350px;
border-radius:20px;
}

/* Hearts */

.heart{
position:fixed;
color:#ff1493;
animation:fade 1s linear forwards;
}

@keyframes fade{
to{opacity:0;transform:translateY(-20px);}
}

</style>

</head>

<body>

<div id="startScreen">
<h2>Hey there!! Toodles...ready? ❤️</h2>
<button id="startBtn">Tap to Begin 💖</button>
</div>

<audio id="music" loop>
<source src="romantic.mp3" type="audio/mpeg">
</audio>

<div class="gallery" id="gallery">
<div class="galleryTrack" id="track"></div>
</div>

<div class="proposal" id="proposal">

<h2 id="proposalText"></h2>

<div class="proposalButtons">
<button id="yesBtn">Theek hai, kar hi leti hu</button>
<button id="noBtn">Kabhi Nahi</button>
</div>

<div id="wedding">
<img src="wedding.gif">
</div>

</div>

<script>

/* ---------- EMAIL + SHEET TRACKER ---------- */

function notifyOpen(){
fetch("https://script.google.com/macros/s/AKfycbxrYjdm8gRZJaU-tQDH-TK6KT-EMjIhe700wzxm7hZCsfGlpR7TgCTubl85KkznesUPxA/exec");
}

/* Floating hearts background */

setInterval(()=>{
let heart=document.createElement("div")
heart.className="bgHeart"
heart.innerHTML="💗"
heart.style.left=Math.random()*window.innerWidth+"px"
heart.style.fontSize=(10+Math.random()*20)+"px"
document.body.appendChild(heart)
setTimeout(()=>heart.remove(),8000)
},400)

/* Gallery setup */

let captions=[
"Mr. Imperfect trying to impress Miss Perfect. Let's see where it goes!",
"I promise I will learn to tie my shoelaces better so that you never have to wait for me in the middle of the road 😌",
"I promise I will polish my flirting skills so that you don't have to be non-chalant",
"I promise to be by your side through the Ups & Downs of the journey we call life",
"...and through the Ebbs & Flows of it, and make you laugh at the most inappropriate moments",
"I promise to remember all the important dates",
"I promise that if I ever get drunk, you will be my first drunk call",
"I promise I will always try to resolve disagreements with honesty"
]

let track=document.getElementById("track")

for(let i=1;i<=8;i++){
track.innerHTML+=`
<div class="photo-card">
<img src="photo${i}.png">
<div class="caption">${captions[i-1]}</div>
</div>
`
}

/* Start button */

document.getElementById("startBtn").onclick=function(){

notifyOpen()

try{
document.getElementById("music").play()
}catch(e){}

document.getElementById("startScreen").style.display="none"
document.getElementById("gallery").style.display="block"

}

/* YES button */

document.getElementById("yesBtn").onclick=function(){

document.getElementById("noBtn").style.display="none"

document.getElementById("wedding").style.display="block"

confetti()

}

/* Hearts burst */

function confetti(){

for(let i=0;i<200;i++){

let div=document.createElement("div")

div.className="heart"
div.innerHTML="❤️"

div.style.left=Math.random()*window.innerWidth+"px"
div.style.top=Math.random()*window.innerHeight+"px"

document.body.appendChild(div)

setTimeout(()=>div.remove(),1000)

}

}

</script>

</body>
</html>
